apiVersion: apps/v1
kind: Deployment
metadata:
  name: prom-otel-instrumented-app
spec:
  template:
    spec:
      containers:
        - name: app
          image: quay.io/falrayes/prom-otel-instrumented-app:stage-latest
          env:
            - name: ENVIRONMENT
              value: "stage"
            - name: OTEL_SERVICE_NAME
              value: "prom-otel-instrumented-app-stage"

